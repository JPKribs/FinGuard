# --------------------------------------------------
# WireGuard Setup
# --------------------------------------------------

# Deploy WireGuard configuration
- name: Deploy WireGuard config
  copy:
    dest: "/etc/wireguard/{{ wg_interface }}.conf"
    content: "{{ wg_conf }}"
    mode: '0600'
  tags: [wireguard]

# Enable and start WireGuard
- name: Enable & start WireGuard
  systemd:
    name: "wg-quick@{{ wg_interface }}"
    enabled: true
    state: started
  tags: [wireguard]

# Create WireGuard service override directory
- name: Create override dir for WireGuard service
  file:
    path: "/etc/systemd/system/wg-quick@{{ wg_interface }}.service.d"
    state: directory
    mode: '0755'
  tags: [wireguard]

# Ensure WireGuard auto-restarts on failure
- name: Ensure WireGuard auto-restart on failure
  copy:
    dest: "/etc/systemd/system/wg-quick@{{ wg_interface }}.service.d/override.conf"
    content: |
      [Service]
      Restart=on-failure
      RestartSec=5
  notify: Reload systemd
  tags: [wireguard]

# -----------
# Avahi/mDNS Setup
# -----------

# Ensure Avahi is running
- name: Ensure Avahi is running
  systemd:
    name: avahi-daemon
    enabled: true
    state: started
  tags: [mdns]

# Create Avahi services directory
- name: Ensure Avahi services directory exists
  file:
    path: /etc/avahi/services
    state: directory
    mode: '0755'
  tags: [mdns]

# Deploy Avahi service files for each service
- name: Deploy Avahi service files for each service
  copy:
    dest: "/etc/avahi/services/{{ item.hostname }}.service"
    content: |
      <?xml version="1.0" standalone='no'?>
      <!DOCTYPE service-group SYSTEM "avahi-service.dtd">
      <service-group>
        <name replace-wildcards="yes">{{ item.hostname }}</name>
        <service>
          <type>_http._tcp</type>
          <port>80</port>
          <txt-record>path={{ item.path }}</txt-record>
        </service>
        <service>
          <type>_https._tcp</type>
          <port>443</port>
          <txt-record>path={{ item.path }}</txt-record>
        </service>
      </service-group>
    mode: '0644'
  loop: "{{ services }}"
  notify: Restart Avahi
  tags: [mdns]

# Configure Avahi to publish multiple hostnames
- name: Configure Avahi daemon
  lineinfile:
    path: /etc/avahi/avahi-daemon.conf
    regexp: "^#?{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
    state: present
  loop:
    - { key: "host-name", value: "{{ hostname }}" }
    - { key: "domain-name", value: "local" }
    - { key: "publish-hinfo", value: "yes" }
    - { key: "publish-workstation", value: "yes" }
    - { key: "publish-domain", value: "yes" }
    - { key: "publish-addresses", value: "yes" }
    - { key: "publish-aaaa-on-ipv4", value: "no" }
    - { key: "publish-a-on-ipv6", value: "no" }
  notify: Restart Avahi
  tags: [mdns]

# -----------
# Jellyfin Discovery Proxy Setup
# -----------

# Get latest release info
- name: Get latest release info from GitHub
  uri:
    url: "https://api.github.com/repos/JPKribs/jellyfin-discovery-proxy/releases/latest"
    method: GET
    return_content: yes
    status_code: 200
    body_format: json
    validate_certs: yes
  register: github_latest_release
  tags: [discovery]

# Set Discovery Proxy version
- name: Set Discovery Proxy version from latest release
  set_fact:
    release_version: "{{ github_latest_release.json.tag_name }}"
  tags: [discovery]

# Download Discovery Proxy binary
- name: Download Discovery Proxy binary
  get_url:
    url: "https://github.com/JPKribs/jellyfin-discovery-proxy/releases/download/{{ release_version }}/jellyfin-discovery-proxy_{{ release_version }}_linux-arm64"
    dest: "{{ binary_dest }}"
    mode: '0755'
  register: binary_download
  tags: [discovery]

# Deploy Discovery Proxy systemd service
- name: Deploy Discovery Proxy systemd service
  template:
    src: jellyfin-discovery-proxy.service.j2
    dest: /etc/systemd/system/jellyfin-discovery-proxy.service
  notify:
    - Reload systemd
    - Restart Discovery Proxy
  tags: [discovery]

# Enable and start Discovery Proxy
- name: Ensure Discovery Proxy service is enabled & started
  systemd:
    name: jellyfin-discovery-proxy
    enabled: true
    state: started
  tags: [discovery]