# --------------------------------------------------
# WireGuard Setup
# --------------------------------------------------

# Deploys WireGuard configuration file to establish VPN tunnel.
- name: Deploy WireGuard config
  copy:
    dest: "/etc/wireguard/{{ wg_interface }}.conf"
    content: "{{ wg_conf }}"
    mode: '0600'
  tags: [wireguard]

# Enables and starts WireGuard interface service.
- name: Enable & start WireGuard
  systemd:
    name: "wg-quick@{{ wg_interface }}"
    enabled: true
    state: started
  tags: [wireguard]

# Creates directory for WireGuard systemd service overrides.
- name: Create override dir for WireGuard service
  file:
    path: "/etc/systemd/system/wg-quick@{{ wg_interface }}.service.d"
    state: directory
    mode: '0755'
  tags: [wireguard]

# Ensures WireGuard service auto-restarts on failure.
- name: Ensure WireGuard auto-restart on failure
  copy:
    dest: "/etc/systemd/system/wg-quick@{{ wg_interface }}.service.d/override.conf"
    content: |
      [Service]
      Restart=on-failure
      RestartSec=5
  notify: Reload systemd
  tags: [wireguard]

# --------------------------------------------------
# Dynamic Virtual Interface Setup
# --------------------------------------------------

# Calculates dynamic IP addresses for service aliases based on main interface IP.
- name: Calculate service IPs for virtual interfaces
  set_fact:
    service_ips: >-
      {%- set result = {} -%}
      {%- set base_ip_parts = ansible_default_ipv4.address.split('.') -%}
      {%- set base_last_octet = base_ip_parts[3] | int -%}
      {%- set services_with_aliases = services | selectattr('alias', 'defined') | rejectattr('alias', 'equalto', '') | list -%}
      {%- for service in services_with_aliases -%}
        {%- set new_ip = base_ip_parts[0] + '.' + base_ip_parts[1] + '.' + base_ip_parts[2] + '.' + ((base_last_octet + loop.index) | string) -%}
        {%- set _ = result.update({service.alias: new_ip}) -%}
      {%- endfor -%}
      {{ result }}

# Creates virtual network interfaces for each service alias with unique IP addresses.
- name: Create virtual interfaces for service aliases
  command: >
    ip addr add {{ service_ips[item.alias] }}/{{ ansible_default_ipv4.netmask | ipaddr('prefix') }} 
    dev {{ ansible_default_ipv4.interface }} 
    label {{ ansible_default_ipv4.interface }}:{{ loop.index }}
  loop: "{{ services | selectattr('alias', 'defined') | rejectattr('alias', 'equalto', '') | list }}"
  register: virtual_interface_result
  failed_when: virtual_interface_result.rc != 0 and 'File exists' not in virtual_interface_result.stderr
  changed_when: virtual_interface_result.rc == 0

# Makes virtual interfaces persistent across reboots by adding to network configuration.
- name: Make virtual interfaces persistent
  blockinfile:
    path: /etc/network/interfaces
    marker: "# {mark} ANSIBLE MANAGED VIRTUAL INTERFACES"
    block: |
      {% for service in services | selectattr('alias', 'defined') | rejectattr('alias', 'equalto', '') | list %}
      # {{ service.alias }} service virtual interface
      auto {{ ansible_default_ipv4.interface }}:{{ loop.index }}
      iface {{ ansible_default_ipv4.interface }}:{{ loop.index }} inet static
          address {{ service_ips[service.alias] }}
          netmask {{ ansible_default_ipv4.netmask }}
      
      {% endfor %}
    create: yes
    backup: yes

# --------------------------------------------------
# Avahi/mDNS Setup  
# --------------------------------------------------

# Ensures Avahi daemon is enabled and running for mDNS.
- name: Ensure Avahi is running
  systemd:
    name: avahi-daemon
    enabled: true
    state: started
  tags: [mdns]

# Deploys Avahi service files for each service alias with dedicated IP addresses.
- name: Deploy Avahi service files for service aliases with dedicated IPs
  copy:
    dest: "/etc/avahi/services/{{ item.alias }}.{{ hostname }}.service"
    content: |
      <?xml version="1.0" standalone='no'?>
      <!DOCTYPE service-group SYSTEM "avahi-service.dtd">
      <service-group>
        <name replace-wildcards="yes">{{ item.alias }}.{{ hostname }}</n>
        <service>
          <type>_http._tcp</type>
          <port>80</port>
          <host-name>{{ item.alias }}.{{ hostname }}.local</host-name>
        </service>
      </service-group>
    mode: '0644'
  loop: "{{ services | selectattr('alias', 'defined') | rejectattr('alias', 'equalto', '') | list }}"
  notify: Restart Avahi
  tags: [mdns]

# --------------------------------------------------
# Jellyfin Discovery Proxy Setup
# --------------------------------------------------

# Fetches latest release information from GitHub API.
- name: Get latest release info from GitHub
  uri:
    url: "https://api.github.com/repos/JPKribs/jellyfin-discovery-proxy/releases/latest"
    method: GET
    return_content: yes
    status_code: 200
    body_format: json
    validate_certs: yes
  register: github_latest_release
  tags: [discovery]

# Sets release version fact from fetched GitHub release info.
- name: Set Discovery Proxy version from latest release
  set_fact:
    release_version: "{{ github_latest_release.json.tag_name }}"
  tags: [discovery]

# Downloads the Jellyfin Discovery Proxy binary for ARM64.
- name: Download Discovery Proxy binary
  get_url:
    url: "https://github.com/JPKribs/jellyfin-discovery-proxy/releases/download/{{ release_version }}/jellyfin-discovery-proxy_{{ release_version }}_linux-arm64"
    dest: "{{ binary_dest }}"
    mode: '0755'
  register: binary_download
  tags: [discovery]

# Deploys systemd service file for Discovery Proxy.
- name: Deploy Discovery Proxy systemd service
  template:
    src: jellyfin-discovery-proxy.service.j2
    dest: /etc/systemd/system/jellyfin-discovery-proxy.service
  notify:
    - Reload systemd
    - Restart Discovery Proxy
  tags: [discovery]

# Enables and starts the Discovery Proxy service.
- name: Ensure Discovery Proxy service is enabled & started
  systemd:
    name: jellyfin-discovery-proxy
    enabled: true
    state: started
  tags: [discovery]