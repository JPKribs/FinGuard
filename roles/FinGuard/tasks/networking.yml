# --------------------------------------------------
# WireGuard Setup
# --------------------------------------------------

# Deploys WireGuard configuration file to establish VPN tunnel.
- name: Deploy WireGuard config
  copy:
    dest: "/etc/wireguard/{{ wg_interface }}.conf"
    content: "{{ wg_conf }}"
    mode: '0600'
  tags: [wireguard]

# Enables and starts WireGuard interface service.
- name: Enable & start WireGuard
  systemd:
    name: "wg-quick@{{ wg_interface }}"
    enabled: true
    state: started
  tags: [wireguard]

# Creates directory for WireGuard systemd service overrides.
- name: Create override dir for WireGuard service
  file:
    path: "/etc/systemd/system/wg-quick@{{ wg_interface }}.service.d"
    state: directory
    mode: '0755'
  tags: [wireguard]

# Ensures WireGuard service auto-restarts on failure.
- name: Ensure WireGuard auto-restart on failure
  copy:
    dest: "/etc/systemd/system/wg-quick@{{ wg_interface }}.service.d/override.conf"
    content: |
      [Service]
      Restart=on-failure
      RestartSec=5
  notify: Reload systemd
  tags: [wireguard]

# --------------------------------------------------
# Dynamic Virtual Interface Setup
# --------------------------------------------------

# Ensure network facts are gathered for the default interface.
- name: Gather network facts
  ansible.builtin.setup:
    gather_subset:
      - network
  when: ansible_default_ipv4 is not defined or ansible_default_ipv4.interface is not defined

# Configure virtual network interfaces for each service alias to use DHCP for IPv4 and IPv6.
- name: Configure virtual interfaces for service aliases with DHCP
  ansible.builtin.blockinfile:
    path: /etc/network/interfaces
    marker: "# {mark} ANSIBLE MANAGED VIRTUAL INTERFACES"
    block: |
      {% for service in services | selectattr('alias', 'defined') | rejectattr('alias', 'equalto', '') | list %}
      # {{ service.alias }} service virtual interface (DHCP IPv4/IPv6)
      auto {{ ansible_default_ipv4.interface }}:{{ loop.index }}
      iface {{ ansible_default_ipv4.interface }}:{{ loop.index }} inet dhcp
      iface {{ ansible_default_ipv4.interface }}:{{ loop.index }} inet6 dhcp
      {% endfor %}
    create: yes
    backup: yes
  notify: Restart networking service
  when: ansible_default_ipv4 is defined and ansible_default_ipv4.interface is defined

# --------------------------------------------------
# Avahi/mDNS Setup
# --------------------------------------------------

# Ensures Avahi daemon is enabled and running for mDNS.
- name: Ensure Avahi is running
  systemd:
    name: avahi-daemon
    enabled: true
    state: started
  tags: [mdns]

# Deploys Avahi service files for each service alias.
- name: Deploy Avahi service files for service aliases
  copy:
    dest: "/etc/avahi/services/{{ item.alias }}.{{ hostname }}.service"
    content: |
      <?xml version="1.0" standalone='no'?>
      <!DOCTYPE service-group SYSTEM "avahi-service.dtd">
      <service-group>
        <name replace-wildcards="yes">{{ item.alias }}.{{ hostname }}</name>
        <service>
          <type>_http._tcp</type>
          <port>80</port>
        </service>
      </service-group>
    mode: '0644'
  loop: "{{ services | selectattr('alias', 'defined') | rejectattr('alias', 'equalto', '') | list }}"
  notify: Restart Avahi
  tags: [mdns]

# --------------------------------------------------
# Jellyfin Discovery Proxy Setup
# --------------------------------------------------

# Fetches latest release information from GitHub API.
- name: Get latest release info from GitHub
  uri:
    url: "https://api.github.com/repos/JPKribs/jellyfin-discovery-proxy/releases/latest"
    method: GET
    return_content: yes
    status_code: 200
    body_format: json
    validate_certs: yes
  register: github_latest_release
  tags: [discovery]

# Sets release version fact from fetched GitHub release info.
- name: Set Discovery Proxy version from latest release
  set_fact:
    release_version: "{{ github_latest_release.json.tag_name }}"
  tags: [discovery]

# Downloads the Jellyfin Discovery Proxy binary for ARM64.
- name: Download Discovery Proxy binary
  get_url:
    url: "https://github.com/JPKribs/jellyfin-discovery-proxy/releases/download/{{ release_version }}/jellyfin-discovery-proxy_{{ release_version }}_linux-arm64"
    dest: "{{ binary_dest }}"
    mode: '0755'
  register: binary_download
  tags: [discovery]

# Deploys systemd service file for Discovery Proxy.
- name: Deploy Discovery Proxy systemd service
  template:
    src: jellyfin-discovery-proxy.service.j2
    dest: /etc/systemd/system/jellyfin-discovery-proxy.service
  notify:
    - Reload systemd
    - Restart Discovery Proxy
  tags: [discovery]

# Enables and starts the Discovery Proxy service.
- name: Ensure Discovery Proxy service is enabled & started
  systemd:
    name: jellyfin-discovery-proxy
    enabled: true
    state: started
  tags: [discovery]