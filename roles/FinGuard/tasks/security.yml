# --------------------------------------------------
# SSL Certificate Setup
# --------------------------------------------------

# Ensure SSL directories exist
- name: Ensure SSL private key directory exists
  file:
    path: /etc/ssl/private
    state: directory
    mode: '0700'
  tags: [ssl]

- name: Ensure SSL certificate directory exists
  file:
    path: /etc/ssl/certs
    state: directory
    mode: '0755'
  tags: [ssl]

# --------------------------------------------------
# Generate SSL certificates for each service
# --------------------------------------------------

# Generate private keys for each service
- name: Generate private key for each service
  openssl_privatekey:
    path: "/etc/ssl/private/{{ item.hostname }}.key"
    size: 2048
    mode: '0600'
  loop: "{{ services }}"
  tags: [ssl]

# Generate CSRs for each service
- name: Generate CSR for each service
  openssl_csr:
    path: "/etc/ssl/certs/{{ item.hostname }}.csr"
    privatekey_path: "/etc/ssl/private/{{ item.hostname }}.key"
    common_name: "{{ item.hostname }}.local"
    subject_alt_name:
      - "DNS:{{ item.hostname }}.local"
      - "DNS:{{ item.hostname }}"
  loop: "{{ services }}"
  tags: [ssl]

# Generate self-signed certificates for each service
- name: Generate self-signed SSL certificate for each service
  openssl_certificate:
    path: "/etc/ssl/certs/{{ item.hostname }}.crt"
    privatekey_path: "/etc/ssl/private/{{ item.hostname }}.key"
    csr_path: "/etc/ssl/certs/{{ item.hostname }}.csr"
    provider: selfsigned
    selfsigned_not_after: "+370d"
  loop: "{{ services }}"
  tags: [ssl]

# --------------------------------------------------
# SSL Certificate Renewal Automation
# --------------------------------------------------

# Deploy SSL renewal script
- name: Deploy SSL certificate renewal script
  template:
    src: renew-ssl-cert.sh.j2
    dest: /usr/local/bin/renew-ssl-cert.sh
    mode: '0755'
  tags: [ssl]

# Deploy SSL renewal systemd service
- name: Deploy SSL certificate renewal systemd service
  template:
    src: renew-ssl-cert.service.j2
    dest: /etc/systemd/system/renew-ssl-cert.service
  notify: Reload systemd
  tags: [ssl]

# Deploy SSL renewal systemd timer
- name: Deploy SSL certificate renewal systemd timer
  template:
    src: renew-ssl-cert.timer.j2
    dest: /etc/systemd/system/renew-ssl-cert.timer
  notify: Reload systemd
  tags: [ssl]

# Enable SSL renewal timer
- name: Enable SSL certificate renewal timer
  systemd:
    name: renew-ssl-cert.timer
    enabled: true
    state: started
  tags: [ssl]