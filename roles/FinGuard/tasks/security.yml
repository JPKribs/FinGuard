# --------------------------------------------------
# SSL Certificate Setup
# --------------------------------------------------

# Ensures the directory for storing SSL private keys exists with appropriate permissions.
- name: Ensure SSL private key directory exists
  file:
    path: /etc/ssl/private
    state: directory
    mode: '0700'
  tags: [ssl]

# Generates a new 2048-bit RSA private key for the self-signed SSL certificate.
- name: Generate private key for self-signed SSL certificate
  openssl_privatekey:
    path: /etc/ssl/private/{{ hostname }}.key
    size: 2048
    mode: '0600'
  tags: [ssl]

# Generates a Certificate Signing Request (CSR) using the newly created private key.
- name: Generate CSR for self-signed SSL certificate
  openssl_csr:
    path: /etc/ssl/certs/{{ hostname }}.csr
    privatekey_path: /etc/ssl/private/{{ hostname }}.key
    common_name: "{{ hostname }}"
    subject_alt_name: "DNS:{{ hostname }},DNS:{{ hostname }}.local"
  tags: [ssl]

# Generates the self-signed SSL certificate using the private key and CSR.
- name: Generate self-signed SSL certificate
  openssl_certificate:
    path: /etc/ssl/certs/{{ hostname }}.crt
    privatekey_path: /etc/ssl/private/{{ hostname }}.key
    csr_path: /etc/ssl/certs/{{ hostname }}.csr
    provider: selfsigned
    selfsigned_not_after: "+370d" 
  tags: [ssl]

# --------------------------------------------------
# SSL Certificate Renewal Automation
# --------------------------------------------------

# Deploys a shell script responsible for renewing the self-signed SSL certificate.
- name: Deploy SSL certificate renewal script
  template:
    src: renew-ssl-cert.sh.j2
    dest: /usr/local/bin/renew-ssl-cert.sh
    mode: '0755'
  tags: [ssl]

# Deploys a systemd service unit file for the SSL certificate renewal script.
- name: Deploy SSL certificate renewal systemd service
  template:
    src: renew-ssl-cert.service.j2
    dest: /etc/systemd/system/renew-ssl-cert.service
  notify: Reload systemd
  tags: [ssl]

# Deploys a systemd timer unit file to periodically trigger the SSL certificate renewal service.
- name: Deploy SSL certificate renewal systemd timer
  template:
    src: renew-ssl-cert.timer.j2
    dest: /etc/systemd/system/renew-ssl-cert.timer
  notify: Reload systemd
  tags: [ssl]

# Enables and starts the systemd timer for SSL certificate renewal.
- name: Enable SSL certificate renewal timer
  systemd:
    name: renew-ssl-cert.timer
    enabled: true
    state: started
  tags: [ssl]
