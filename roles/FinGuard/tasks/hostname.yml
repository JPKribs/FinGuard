# --------------------------------------------------
# Validate hostname format
# --------------------------------------------------
- name: Validate hostname format
  fail:
    msg: "Hostname '{{ hostname }}' is invalid. Must be alphanumeric with hyphens only, max 63 chars."
  when: 
    - hostname is not match('^[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?$')
    - hostname | length > 63

# --------------------------------------------------
# Dynamically build hostname aliases for /etc/hosts
# --------------------------------------------------
- name: Set hostname alias list from services
  set_fact:
    hostname_aliases: >-
      {{
        services
        | selectattr('alias', 'defined')
        | rejectattr('alias', 'equalto', '')
        | map(attribute='alias')
        | map('regex_replace', '^(.*)$', '\\1.{{ hostname }}.local \\1.{{ hostname }}')
        | list
      }}

# --------------------------------------------------
# Set hostname via hostnamectl
# --------------------------------------------------
- name: Set hostname via hostnamectl (primary method)
  command: hostnamectl set-hostname {{ hostname }}
  register: hostnamectl_result
  changed_when: true

# --------------------------------------------------
# Verify hostnamectl succeeded
# --------------------------------------------------
- name: Verify hostnamectl succeeded
  command: hostnamectl status --static
  register: hostnamectl_check
  failed_when: hostnamectl_check.stdout.strip() != hostname

# --------------------------------------------------
# Write hostname to /etc/hostname
# --------------------------------------------------
- name: Write hostname to /etc/hostname (backup method)
  copy:
    content: "{{ hostname }}\n"
    dest: /etc/hostname
    mode: '0644'
    backup: yes

# --------------------------------------------------
# Verify /etc/hostname content
# --------------------------------------------------
- name: Verify /etc/hostname content
  slurp:
    src: /etc/hostname
  register: etc_hostname_content
  failed_when: (etc_hostname_content.content | b64decode).strip() != hostname

# --------------------------------------------------
# Update /etc/hosts with hostname and aliases
# --------------------------------------------------
- name: Update /etc/hosts with proper entries
  blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED HOSTNAME BLOCK"
    block: |
      127.0.0.1       localhost
      127.0.1.1       {{ hostname }}.local {{ hostname }}{% for alias in hostname_aliases %} {{ alias }}{% endfor %}

      # IPv6 entries
      ::1             localhost ip6-localhost ip6-loopback
      ff02::1         ip6-allnodes
      ff02::2         ip6-allrouters
    backup: yes

# --------------------------------------------------
# Verify /etc/hosts contains correct entry
# --------------------------------------------------
- name: Verify /etc/hosts contains correct entry
  lineinfile:
    path: /etc/hosts
    line: >-
      127.0.1.1       {{ hostname }}.local {{ hostname }}{% for alias in hostname_aliases %} {{ alias }}{% endfor %}
    state: present
  check_mode: yes
  register: hosts_check
  failed_when: hosts_check.changed

# --------------------------------------------------
# Create hostname verification script
# --------------------------------------------------
- name: Create hostname verification script
  copy:
    dest: /usr/local/bin/verify-hostname.sh
    mode: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail

      EXPECTED_HOSTNAME="{{ hostname }}"
      EXPECTED_ALIASES="{% for alias in hostname_aliases %} {{ alias }}{% endfor %}"

      # Check hostnamectl
      CURRENT_HOSTNAME=$(hostnamectl status --static 2>/dev/null || echo "FAILED")
      if [[ "$CURRENT_HOSTNAME" != "$EXPECTED_HOSTNAME" ]]; then
        echo "ERROR: hostnamectl shows '$CURRENT_HOSTNAME', expected '$EXPECTED_HOSTNAME'"
        hostnamectl set-hostname "$EXPECTED_HOSTNAME"
        echo "FIXED: Set hostname via hostnamectl"
      fi

      # Check /etc/hostname
      if [[ ! -f /etc/hostname ]] || [[ "$(cat /etc/hostname | tr -d '\n')" != "$EXPECTED_HOSTNAME" ]]; then
        echo "$EXPECTED_HOSTNAME" > /etc/hostname
        echo "FIXED: Updated /etc/hostname"
      fi

      # Check /etc/hosts
      # Remove old 127.0.1.1 entries and add the new one
      if ! grep -q "127.0.1.1.*$EXPECTED_HOSTNAME" /etc/hosts || ! grep -q "$EXPECTED_ALIASES" /etc/hosts; then
        sed -i '/^127\.0\.1\.1/d' /etc/hosts
        echo "127.0.1.1       $EXPECTED_HOSTNAME.local $EXPECTED_HOSTNAME$EXPECTED_ALIASES" >> /etc/hosts
        echo "FIXED: Updated /etc/hosts"
      fi

      # Final verification
      FINAL_CHECK=$(hostname 2>/dev/null || echo "FAILED")
      if [[ "$FINAL_CHECK" != "$EXPECTED_HOSTNAME" ]]; then
        echo "CRITICAL: hostname command still shows '$FINAL_CHECK' after fixes"
        exit 1
      fi

      echo "SUCCESS: Hostname is correctly set to '$EXPECTED_HOSTNAME'"

# --------------------------------------------------
# Run initial hostname verification script
# --------------------------------------------------
- name: Run initial hostname verification
  command: /usr/local/bin/verify-hostname.sh
  register: hostname_verification
  changed_when: "'FIXED:' in hostname_verification.stdout"

# --------------------------------------------------
# Display verification results
# --------------------------------------------------
- name: Display verification results
  debug:
    var: hostname_verification.stdout_lines

# --------------------------------------------------
# Create hostname guardian systemd service
# --------------------------------------------------
- name: Create hostname guardian systemd service
  copy:
    dest: /etc/systemd/system/hostname-guardian.service
    content: |
      [Unit]
      Description=Hostname Guardian - Ensure hostname stays correct
      After=systemd-hostnamed.service
      Before=network.target avahi-daemon.service

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/verify-hostname.sh
      RemainAfterExit=yes
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target
  notify: Reload systemd

# --------------------------------------------------
# Enable hostname guardian service
# --------------------------------------------------
- name: Enable hostname guardian service
  systemd:
    name: hostname-guardian.service
    enabled: true
    state: started
    daemon_reload: true

# --------------------------------------------------
# Create hostname guardian timer for periodic checks
# --------------------------------------------------
- name: Create hostname guardian timer for periodic checks
  copy:
    dest: /etc/systemd/system/hostname-guardian.timer
    content: |
      [Unit]
      Description=Check hostname every 5 minutes

      [Timer]
      OnBootSec=1min
      OnUnitActiveSec=5min
      Unit=hostname-guardian.service

      [Install]
      WantedBy=timers.target
  notify: Reload systemd

# --------------------------------------------------
# Enable hostname guardian timer
# --------------------------------------------------
- name: Enable hostname guardian timer
  systemd:
    name: hostname-guardian.timer
    enabled: true
    state: started
    daemon_reload: true

# --------------------------------------------------
# Force immediate hostname refresh
# --------------------------------------------------
- name: Force immediate hostname refresh commands
  command: "{{ item }}"
  loop:
    - systemctl restart systemd-hostnamed
    - hostname {{ hostname }}
  changed_when: false

# --------------------------------------------------
# Final comprehensive hostname verification
# --------------------------------------------------
- block:
    # Check hostname command output
    - name: Check hostname command output
      command: hostname
      register: hostname_cmd_check
      failed_when: hostname_cmd_check.stdout.strip() != hostname

    # Check hostnamectl output  
    - name: Check hostnamectl output  
      command: hostnamectl status --static
      register: hostnamectl_final_check
      failed_when: hostnamectl_final_check.stdout.strip() != hostname

    # Check system can resolve hostname.local
    - name: Check system can resolve hostname.local
      command: getent hosts {{ hostname }}.local
      register: mdns_check
      failed_when: mdns_check.rc != 0

    # Displays the final verification status for all checks.
    - name: Display final status
      debug:
        msg: 
          - "✓ hostname command: {{ hostname_cmd_check.stdout | trim }}"
          - "✓ hostnamectl: {{ hostnamectl_final_check.stdout | trim }}"  
          - "✓ mDNS resolution: {{ mdns_check.stdout | default('N/A', true) | trim }}"

# --------------------------------------------------
# Set /etc/machine-info PRETTY_HOSTNAME (optional)
# --------------------------------------------------
- name: Set /etc/machine-info PRETTY_HOSTNAME
  lineinfile:
    path: /etc/machine-info
    regexp: '^PRETTY_HOSTNAME='
    line: "PRETTY_HOSTNAME={{ hostname }}"
    create: yes

# --------------------------------------------------
# Failsafe: fallback to set hostname via fstab on boot
# --------------------------------------------------
- name: Ensure fallback boot-time script exists
  copy:
    dest: /usr/local/sbin/set-hostname-fstab.sh
    mode: '0755'
    content: |
      #!/bin/sh
      CURRENT=$(hostname)
      if [ "$CURRENT" != "{{ hostname }}" ]; then
        echo "[fstab-fallback] Setting hostname to '{{ hostname }}' (was: $CURRENT)" >> /var/log/hostname-fallback.log
        hostnamectl set-hostname {{ hostname }}
      fi

- name: Add dummy fstab entry to trigger hostname fallback at boot
  lineinfile:
    path: /etc/fstab
    insertafter: EOF
    line: "hostname-fallback /usr/local/sbin/set-hostname-fstab.sh none defaults,x-systemd.before=network.target,x-systemd.mount-timeout=10,bind 0 0"
