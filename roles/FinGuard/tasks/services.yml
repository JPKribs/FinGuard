# --------------------------------------------------
# Final Service Management
# --------------------------------------------------

# Ensure core services are enabled and running
- name: Ensure core services are enabled & running
  systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - jellyfin-discovery-proxy
    - nginx
    - "wg-quick@{{ wg_interface }}"
    - mdns-publisher
    - avahi-daemon

# Verify service accessibility
- name: Verify service endpoints
  uri:
    url: "https://{{ item.hostname }}.local/status"
    validate_certs: no
    status_code: 200
    timeout: 5
  loop: "{{ services }}"
  ignore_errors: true
  register: endpoint_checks

# Display endpoint check results
- name: Display endpoint verification results
  debug:
    msg: "{{ item.item.hostname }}.local: {{ 'OK' if item.status == 200 else 'FAILED' }}"
  loop: "{{ endpoint_checks.results }}"
  when: endpoint_checks is defined

# Final status message
- name: Display final status
  debug:
    msg: |
      FinGuard setup complete!
      
      Services are accessible at:
      {% for service in services %}
      - https://{{ service.hostname }}.local - {{ service.name | title }}
      {% endfor %}
      
      Status dashboard: https://{{ services[0].hostname }}.local/status
      
      A reboot is recommended for all changes to take effect.