# --------------------------------------------------
# Package Installation
# --------------------------------------------------

# Ensures the APT package cache is updated before installing new packages.
- name: Ensure apt cache is up to date
  apt:
    update_cache: yes
  tags: [packages]

# Installs a list of essential packages required for the system's functionality.
- name: Install required packages
  apt:
    name:
      - wireguard-tools
      - nginx
      - avahi-daemon
      - avahi-utils
      - resolvconf
      - cron
      - openssl
      - jq
      - bc
    state: present
  tags: [packages]

# --------------------------------------------------
# System Configuration
# --------------------------------------------------

# Sets the system's timezone based on the 'timezone' variable.
- name: Set system timezone
  timezone:
    name: "{{ timezone }}"

# --------------------------------------------------
# Hostname Setup
# --------------------------------------------------

# Write hostname to /etc/hostname file (primary source)
- name: Set hostname in /etc/hostname
  copy:
    content: "{{ hostname }}\n"
    dest: /etc/hostname
    owner: root
    group: root
    mode: '0644'
  tags: [hostname]

# Set hostname using hostnamectl (systemd method)
- name: Set system hostname with hostnamectl
  command: hostnamectl set-hostname "{{ hostname }}"
  tags: [hostname]

# Update /etc/hosts file
- name: Update /etc/hosts file
  lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1.*'
    line: "127.0.1.1       {{ hostname }}.local {{ hostname }}"
    owner: root
    group: root
    mode: '0644'
  tags: [hostname]

# Remove any conflicting hostname entries
- name: Remove old hostname from /etc/hosts
  lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1.*NanoPi-Zero2.*'
    state: absent
  tags: [hostname]

# Create systemd service to ensure hostname persists
- name: Create hostname persistence service
  copy:
    content: |
      [Unit]
      Description=Set hostname
      After=systemd-hostnamed.service
      Before=network.target

      [Service]
      Type=oneshot
      ExecStart=/bin/hostnamectl set-hostname {{ hostname }}
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/set-hostname.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd
  tags: [hostname]

# Enable the hostname service
- name: Enable hostname persistence service
  systemd:
    name: set-hostname.service
    enabled: true
  tags: [hostname]

# --------------------------------------------------
# User Management & Updates
# --------------------------------------------------

# Optionally resets the 'pi' user's password if 'pi_password' is defined and not empty.
- name: Optionally reset pi password
  shell: echo "pi:{{ pi_password }}" | chpasswd
  when: pi_password is defined and pi_password != ""
  no_log: true

# Updates the APT package cache and upgrades all installed packages.
- name: Update apt cache and upgrade all packages
  apt:
    update_cache: yes
    upgrade: yes
  tags: [packages, updates]