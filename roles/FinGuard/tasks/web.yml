# --------------------------------------------------
# NGINX Service Configuration
# --------------------------------------------------

# Create NGINX service override directory
- name: Create override dir for NGINX
  file:
    path: /etc/systemd/system/nginx.service.d
    state: directory
    mode: '0755'

# Ensure NGINX auto-restarts on failure
- name: Ensure NGINX auto-restart on failure
  copy:
    dest: /etc/systemd/system/nginx.service.d/override.conf
    content: |
      [Service]
      Restart=on-failure
      RestartSec=5
  notify: Reload systemd

# --------------------------------------------------
# NGINX Logging Setup
# --------------------------------------------------

# Ensure NGINX log directory exists
- name: Ensure nginx log directory exists
  file:
    path: /var/log/nginx
    state: directory
    mode: '0755'

# Create NGINX log files
- name: Create required NGINX log files
  file:
    path: "{{ item }}"
    state: touch
    owner: www-data
    group: adm
    mode: '0640'
  loop:
    - /var/log/nginx/access.log
    - /var/log/nginx/error.log

# Configure minimal NGINX logging
- name: Configure NGINX to log minimally
  copy:
    dest: /etc/nginx/conf.d/minimal-logging.conf
    content: |
      # Minimize NGINX logging
      access_log off;
      error_log /var/log/nginx/error.log crit;
  notify:
    - Test NGINX configuration
    - Reload NGINX if valid

# Update main NGINX configuration
- name: Update NGINX log configuration
  blockinfile:
    path: /etc/nginx/nginx.conf
    insertafter: "http {"
    block: |
      # Minimal logging configuration
      access_log /var/log/nginx/access.log combined buffer=4k flush=1m;
      error_log /var/log/nginx/error.log warn;
  notify:
    - Test NGINX configuration
    - Reload NGINX if valid

# --------------------------------------------------
# NGINX Site Configuration
# --------------------------------------------------

# Create sites directories
- name: Ensure NGINX sites directories exist
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /etc/nginx/sites-available
    - /etc/nginx/sites-enabled

# Deploy NGINX virtual host configuration
- name: Deploy NGINX vhost configuration
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/finguard.conf
  notify:
    - Test NGINX configuration
    - Reload NGINX if valid

# Enable NGINX site
- name: Enable NGINX site
  file:
    src: /etc/nginx/sites-available/finguard.conf
    dest: /etc/nginx/sites-enabled/finguard.conf
    state: link
  notify:
    - Test NGINX configuration
    - Reload NGINX if valid

# Disable default NGINX site
- name: Disable NGINX default site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify:
    - Test NGINX configuration
    - Reload NGINX if valid

# Ensure NGINX is started
- name: Ensure NGINX is started and enabled
  systemd:
    name: nginx
    enabled: true
    state: started