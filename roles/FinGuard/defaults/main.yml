# FinGuard configuration

# 1) Host identity
hostname: jellyfin # bare hostname (no .local)

# 2) WireGuard (full wg0.conf text)
wg_conf: |
  [Interface]
  PrivateKey = <YOUR_PRIVATE_KEY>
  Address    = 10.192.1.X/32

  [Peer]
  PublicKey           = <SERVER_PUBLIC_KEY>
  Endpoint            = vpn.example.com:51820
  AllowedIPs          = 10.192.1.254/32
  PersistentKeepalive = 60

# 3) Upstream service IPs (include port if non‑standard)
jellyfin_ip: 10.192.1.254:8096

# 4) Optional: set new password for 'pi'; leave blank to skip
pi_password: ""

# 5) For Discovery Proxy
jellyfin_server_url: "http://{{ jellyfin_ip }}"

# WireGuard interface name & discovery build paths
wg_interface: wg0
discovery_repo: "https://github.com/jpkribs/jellyfin-discovery-proxy.git"
discovery_dest: "/opt/jellyfin-discovery-proxy"
binary_dest: "/usr/local/bin/jellyfin-discovery-proxy"

# NGINX site name & timezone
nginx_site_name: "{{ hostname }}.local"
timezone: America/Denver