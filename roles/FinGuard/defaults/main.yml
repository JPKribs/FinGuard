# --------------------------------------------------
# FinGuard Default Configurations
# --------------------------------------------------

# 1) Host identity
hostname: jellyfin

# 2) WireGuard (full wg#.conf text)
wg_conf: ""

# 3) Services configuration
services: []

# 4) Optional: set new password for 'pi'; leave blank to skip
pi_password: ""

# 5) For Discovery Proxy
jellyfin_server_url: "http://10.192.1.254:80"

# 6) FinGuard weekly‐update schedule
finguard_update_day: Wed # e.g. Mon, Tue, Wed, Thu, Fri, Sat, Sun
finguard_update_time: "03:00:00" # HH:MM:SS

# 7) WireGuard interface name & discovery build paths (sensible defaults)
wg_interface: wg0
discovery_repo: "https://github.com/jpkribs/jellyfin-discovery-proxy.git"
discovery_dest: "/opt/jellyfin-discovery-proxy"
binary_dest: "/usr/local/bin/jellyfin-discovery-proxy"

# 8) NGINX site name & timezone
nginx_site_name: "{{ hostname }}.local"
timezone: America/Denver